name: 缺陷报告
description: 用可进入规格流程的方式报告缺陷或回归问题。
title: "[缺陷] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        当你要报告缺陷、回归问题或流程失效时，请使用此模板。
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 哪里出了问题？为什么这件事重要？
      placeholder: 描述缺陷现象及其影响。
    validations:
      required: true
  - type: textarea
    id: affected_users
    attributes:
      label: 受影响用户与场景
      description: 谁受到影响？在什么条件下出现？
      placeholder: |
        受影响用户：
        触发流程：
        环境：
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 列出最小复现路径。
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: 预期与实际
      description: 写出预期行为，以及实际发生了什么。
      placeholder: |
        预期：
        实际：
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 证据
      description: 提供日志、截图、失败检查或其他证据。
      placeholder: 补充相关证明材料。
    validations:
      required: false
  - type: textarea
    id: risk
    attributes:
      label: 风险与影响范围
      description: 如果不修，这个问题会带来什么用户、产品或运行风险？
      placeholder: 描述严重程度和影响范围。
    validations:
      required: true
  - type: textarea
    id: suspected_slice
    attributes:
      label: 初步修复切片
      description: 如果已经有判断，请描述最小可能修复或止损动作。
      placeholder: 描述最小可信修复切片。
    validations:
      required: false
